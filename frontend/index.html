<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Shop POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>📚 Book Shop POS System</h1>
        <button onclick="loadBooks()">Refresh</button>
    </header>

    <div class="card">
        <h2>Add New Book</h2>

        <form id="bookForm">
            <input type="text" id="title" placeholder="Book Title" required>
            <input type="text" id="author" placeholder="Author" required>
            <input type="number" id="price" placeholder="Price" required>
            <input type="text" id="isbn" placeholder="ISBN" required>

            <button type="submit">
                Add Book
            </button>
        </form>
    </div>

    <div class="card">
        <h2>Books Inventory</h2>

        <input
                type="text"
                id="search"
                placeholder="Search by title..."
                onkeyup="searchBook()"
        >

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody id="bookTable">

            </tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
